# ╔══════════════════════════════════════════════════════════════╗
# ║  STOA LINUX — Hyprland                                     ║
# ║  "A ordem é a primeira lei do céu." — Marco Aurélio        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitor ──
monitor = , preferred, auto, 1

# ── Autostart ──
exec-once = waybar
exec-once = swaybg -i ~/.config/stoa/wallpapers/marble.png -m fill
exec-once = dunst -config ~/.config/dunst/dunstrc

# ── Variáveis de ambiente ──
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ── Input ──
input {
    kb_layout = br
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ── Paleta Estoica ──
$bg         = rgb(211e19)
$bg_light   = rgb(2d2921)
$fg         = rgb(d4cfc4)
$fg_dim     = rgb(a89f91)
$bronze     = rgb(c49a5c)
$gold       = rgb(d4a84b)
$olive      = rgb(8a9a6c)
$terracotta = rgb(b36b5a)
$stone      = rgb(6e6a62)

# ── Aparência ──
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2

    col.active_border = $bronze
    col.inactive_border = $bg_light

    layout = dwindle
}

decoration {
    rounding = 4

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        offset = -7 -7
        render_power = 3
        color = rgba(0a090880)
    }

    inactive_opacity = 0.90
    active_opacity = 1.0
}

animations {
    enabled = true
    bezier = stoa, 0.25, 0.8, 0.25, 1.0

    animation = windows, 1, 4, stoa
    animation = windowsOut, 1, 4, stoa, popin 80%
    animation = border, 1, 6, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 3, stoa
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ── Atalhos ──
$mod = SUPER

bind = $mod, Return, exec, alacritty
bind = $mod, D, exec, rofi -show drun -config ~/.config/rofi/config.rasi
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, Space, togglefloating
bind = $mod SHIFT, E, exit

# ── Navegação (vim) ──
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ── Redimensionar ──
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Workspaces (I a X) ──
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Mouse ──
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Volume ──
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ── Brilho ──
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ──
bind = , Print, exec, grim ~/Imagens/screenshot-$(date +%s).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Imagens/screenshot-$(date +%s).png

# ── Regras ──
windowrulev2 = opacity 1.0 override, class:^(firefox)$
windowrulev2 = opacity 1.0 override, class:^(mpv)$
