print_info() {
    info title
    info underline

    info "Virtude" distro
    info "Logos" kernel
    info "Tempo" uptime
    info "Pacotes" packages
    info "Ágora" shell
    info "Coluna" wm
    info "Tema" theme
    info "Ícones" icons
    info "Letra" term_font
    info "Mente" cpu
    info "Memória" memory
    info "Disco" disk

    info cols
}

# ── Aparência ──
title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="on"
package_managers="on"
shell_path="off"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="C"
gpu_brand="on"
gpu_type="all"
disk_show=('/')
disk_subtitle="mount"

# ── Cores ──
colors=(3 7 3 3 7 7)
bold="on"
underline_enabled="on"
underline_char="─"
separator=" ›"

# ── Backend ──
image_backend="ascii"
image_source="auto"

# ── ASCII Customizado ──
ascii_distro="auto"
ascii_colors=(3 7)
ascii_bold="on"

# ── Saída ──
gap=3
