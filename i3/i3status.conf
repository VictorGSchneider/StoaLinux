general {
    output_format = "i3bar"
    colors = true
    color_good     = "#8a9a6c"
    color_degraded = "#c49a5c"
    color_bad      = "#b36b5a"
    interval = 5
}

order += "disk /"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "cpu_usage"
order += "memory"
order += "volume master"
order += "tztime local"

disk "/" {
    format = " %avail"
}

wireless _first_ {
    format_up = " %essid %quality"
    format_down = " --"
}

ethernet _first_ {
    format_up = " %ip"
    format_down = ""
}

battery all {
    format = "%status %percentage %remaining"
    format_down = ""
    status_chr = ""
    status_bat = ""
    status_unk = ""
    status_full = ""
    low_threshold = 20
    threshold_type = percentage
}

cpu_usage {
    format = " %usage"
}

memory {
    format = " %used / %total"
    threshold_degraded = "1G"
    threshold_critical = "200M"
}

volume master {
    format = " %volume"
    format_muted = " mudo"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = " %a %d %b  %H:%M"
}
